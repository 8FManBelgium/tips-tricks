    <h1>Tips & Tricks voor Windows 11, Samsung, AI, Photoshop en 3ds Max</h1>

<p>
Ontdek gratis tutorials, handleidingen en oplossingen voor Windows 11,
Samsung Galaxy toestellen, AI-tools, Photoshop en 3ds Max.
</p>
    <section class="wrapper-main">
     <video autoplay muted loop id="introVideo">
    <source src="https://res.cloudinary.com/dfxzy1z6m/video/upload/v1780489475/intro-tutorial-full_qitcfj.mp4" type="video/mp4">
</video>

<button id="soundBtn">🔊 Geluid Aan</button>

<script>
const video = document.getElementById("introVideo");
const soundBtn = document.getElementById("soundBtn");

soundBtn.addEventListener("click", () => {

    if (video.muted) {
        video.muted = false;
        video.volume = 1;
        soundBtn.textContent = "🔇 Geluid Uit";
    } else {
        video.muted = true;
        soundBtn.textContent = "🔊 Geluid Aan";
    }

});
</script>
    <button  id="photoshopButton" class="photoshop-button hidden">Photoshop Page</button>
        <button id="3dsmaxButton" class="dsmax-button hidden">3ds max Page</button>
        <button  id="AIButton" class="AI-button hidden">AI Page</button>
        <button  id="windowsButton" class="windows-button hidden">Windows 11 Page</button>
